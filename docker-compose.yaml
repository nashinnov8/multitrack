services:
  api:
    build: .
    container_name: multitrack_api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    depends_on:
      multitrack-postgres:
        condition: service_started

  multitrack-postgres:
    image: postgres:17
    container_name: multitrack_database
    restart: always
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 128mb

volumes:
  pgdata: