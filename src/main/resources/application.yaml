spring:
  application:
    name: multitrack

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multitrack_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  private-key: classpath:keys/private.pem
  public-key: classpath:keys/public.pem
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs