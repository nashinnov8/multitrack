spring:
  application:
    name: multitrack

  datasource:
    url: jdbc:postgresql://localhost:5432/multitrack_db
    username: sys1002
    password: mysecretpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  private-key: classpath:keys/private.pem
  public-key: classpath:keys/public.pem
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:86400}
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs